<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Role Compliance Audit Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F172A;
            --primary-light: #1E293B;
            --accent: #3B82F6;
            --accent-gradient: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            --background: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --primary: #F8FAFC;
            --primary-light: #F1F5F9;
            --accent: #60A5FA;
            --accent-gradient: linear-gradient(135deg, #60A5FA 0%, #3B82F6 100%);
            --background: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
            --success: #34D399;
            --warning: #FBBF24;
            --error: #F87171;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            padding: 2rem;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: #FFFFFF;
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .meta-text {
            font-size: 0.875rem;
            color: #94A3B8;
        }

        .theme-toggle {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .stat-card .label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .filters-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .filters-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text-main);
        }

        .report-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: var(--background);
            color: var(--text-muted);
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-active {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .badge-disabled {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--error);
        }
    </style>
</head>
<body>
    <header>
        <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
        <h1>Security Role Compliance Audit Report</h1>
        <div class="meta-text">Generated on: 2026-06-25 22:54:58 UTC</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="label">Audited Roles</span>
            <span class="value">2</span>
        </div>
        <div class="stat-card">
            <span class="label">Scanned Environments</span>
            <span class="value">3</span>
        </div>
        <div class="stat-card">
            <span class="label">Total Access Matches</span>
            <span class="value" id="total-matches">8</span>
        </div>
    </div>

    <div class="filters-card">
        <div class="filters-flex">
            <input type="text" id="search-input" class="search-input" placeholder="Filter by user, role, or environment..." oninput="filterAudit()">
        </div>
    </div>

    <div class="report-section">
        <table>
            <thead>
                <tr>
                    <th>Environment</th>
                    <th>Audited Role</th>
                    <th>User Name</th>
                    <th>User Email</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="audit-body">
                <!-- Injected via JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        const matches = [{"EnvironmentUniqueName":"contoso-dev","EnvironmentUrl":"https://contoso-dev.crm.dynamics.com","TargetName":"System Administrator","UserName":"Admin User","UserEmail":"admin@contoso.com","IsDisabled":false},{"EnvironmentUniqueName":"contoso-dev","EnvironmentUrl":"https://contoso-dev.crm.dynamics.com","TargetName":"System Administrator","UserName":"Dev Lead","UserEmail":"devlead@contoso.com","IsDisabled":false},{"EnvironmentUniqueName":"contoso-dev","EnvironmentUrl":"https://contoso-dev.crm.dynamics.com","TargetName":"Environment Maker","UserName":"Admin User","UserEmail":"admin@contoso.com","IsDisabled":false},{"EnvironmentUniqueName":"contoso-dev","EnvironmentUrl":"https://contoso-dev.crm.dynamics.com","TargetName":"Environment Maker","UserName":"Dev Lead","UserEmail":"devlead@contoso.com","IsDisabled":false},{"EnvironmentUniqueName":"contoso-test","EnvironmentUrl":"https://contoso-test.crm.dynamics.com","TargetName":"System Administrator","UserName":"Admin User","UserEmail":"admin@contoso.com","IsDisabled":false},{"EnvironmentUniqueName":"contoso-test","EnvironmentUrl":"https://contoso-test.crm.dynamics.com","TargetName":"Environment Maker","UserName":"Admin User","UserEmail":"admin@contoso.com","IsDisabled":false},{"EnvironmentUniqueName":"contoso-prod","EnvironmentUrl":"https://contoso-prod.crm.dynamics.com","TargetName":"System Administrator","UserName":"Admin User","UserEmail":"admin@contoso.com","IsDisabled":false},{"EnvironmentUniqueName":"contoso-prod","EnvironmentUrl":"https://contoso-prod.crm.dynamics.com","TargetName":"Environment Maker","UserName":"Admin User","UserEmail":"admin@contoso.com","IsDisabled":false}];

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'dark');
            }
        }

        function buildAudit() {
            const tbody = document.getElementById('audit-body');
            tbody.innerHTML = '';

            const q = document.getElementById('search-input').value.toLowerCase();
            let count = 0;

            matches.forEach(m => {
                if (q && !m.EnvironmentUniqueName.toLowerCase().includes(q) && 
                    !m.TargetName.toLowerCase().includes(q) && 
                    !m.UserName.toLowerCase().includes(q) && 
                    !m.UserEmail.toLowerCase().includes(q)) {
                    return;
                }

                count++;
                const tr = document.createElement('tr');
                
                const tdEnv = document.createElement('td');
                tdEnv.textContent = m.EnvironmentUniqueName;
                tdEnv.style.fontWeight = '600';
                tr.appendChild(tdEnv);

                const tdRole = document.createElement('td');
                const roleBadge = document.createElement('span');
                roleBadge.className = 'badge';
                roleBadge.style.backgroundColor = 'rgba(59, 130, 246, 0.1)';
                roleBadge.style.color = 'var(--accent)';
                roleBadge.textContent = m.TargetName;
                tdRole.appendChild(roleBadge);
                tr.appendChild(tdRole);

                const tdName = document.createElement('td');
                tdName.textContent = m.UserName;
                tr.appendChild(tdName);

                const tdEmail = document.createElement('td');
                tdEmail.textContent = m.UserEmail;
                tr.appendChild(tdEmail);

                const tdStatus = document.createElement('td');
                const statusBadge = document.createElement('span');
                statusBadge.className = 'badge ' + (m.IsDisabled ? 'badge-disabled' : 'badge-active');
                statusBadge.textContent = m.IsDisabled ? 'Disabled' : 'Active';
                tdStatus.appendChild(statusBadge);
                tr.appendChild(tdStatus);

                tbody.appendChild(tr);
            });

            document.getElementById('total-matches').textContent = count;
        }

        buildAudit();
    </script>
</body>
</html>
